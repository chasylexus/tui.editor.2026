<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <title>ABC Plugin</title>
    <link rel="stylesheet" href="http://localhost:8080/dist/cdn/td-editor.css" />
  </head>
  <body>
    <div id="editor"></div>
    <script src="http://localhost:8080/dist/cdn/td-editor-all.js"></script>
    <script src="../dist/cdn/td-editor-plugin-abc.js"></script>
    <script>
      const content = [
        '```abc',
        'X:1',
        'T:Simple Scale',
        'M:4/4',
        'L:1/4',
        'K:C',
        'C D E F | G A B c |',
        '```'
      ].join('\n');
      const { Editor } = toastui;
      const { abc } = Editor.plugin;
      new Editor({
        el: document.querySelector('#editor'),
        previewStyle: 'vertical',
        height: '500px',
        initialValue: content,
        plugins: [abc]
      });
    </script>
  </body>
</html>
