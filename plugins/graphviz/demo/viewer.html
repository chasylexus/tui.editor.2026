<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <title>Graphviz Viewer</title>
    <link rel="stylesheet" href="http://localhost:8080/dist/cdn/td-editor.css" />
  </head>
  <body>
    <div id="viewer"></div>
    <script src="http://localhost:8080/dist/cdn/td-editor-all.js"></script>
    <script src="../dist/cdn/td-editor-plugin-graphviz.js"></script>
    <script>
      const content = ['```graphviz', 'digraph G { A -> B; B -> C; }', '```'].join('\n');
      const { Editor } = toastui;
      const { graphviz } = Editor.plugin;
      Editor.factory({
        el: document.querySelector('#viewer'),
        viewer: true,
        initialValue: content,
        plugins: [graphviz]
      });
    </script>
  </body>
</html>
