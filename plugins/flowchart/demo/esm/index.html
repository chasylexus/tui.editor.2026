<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Flowchart Plugin (ESM)</title>
  </head>
  <body>
    <div id="editor"></div>
    <script type="module">
      import { Editor } from 'http://localhost:8080/dist/index.js';
      import flowchartPlugin from '/dist/index.js';

      const content = ['```flow', 'st=>start: Start', 'e=>end', 'st->e', '```'].join('\n');

      new Editor({
        el: document.querySelector('#editor'),
        previewStyle: 'vertical',
        height: '500px',
        initialValue: content,
        plugins: [flowchartPlugin]
      });
    </script>
  </body>
</html>
