<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <title>Sequence Plugin (ESM)</title>
  </head>
  <body>
    <div class="code-html">
      <h2>Editor</h2>
      <div id="editor"></div>
    </div>
    <script type="module">
      import { Editor } from 'http://localhost:8080/dist/index.js';
      import sequencePlugin from '/dist/index.js';

      const content = [
        '```sequence',
        'Alice->Bob: Hello',
        'Bob-->Alice: Hi',
        '```'
      ].join('\n');

      new Editor({
        el: document.querySelector('#editor'),
        previewStyle: 'vertical',
        height: '500px',
        initialValue: content,
        plugins: [sequencePlugin]
      });
    </script>
  </body>
</html>
