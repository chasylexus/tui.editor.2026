<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>draw.io Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #root,
      .mxgraph {
        width: 100%;
        height: 100%;
      }

      #root * {
        box-sizing: border-box;
      }

      #status {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        color: #5f6b7a;
        background: transparent;
        text-align: center;
        font-size: 14px;
      }

      #status.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading draw.io document…</div>
    <div id="root" class="mxgraph" aria-label="draw.io document"></div>

    <script>
      (function initDrawioViewer() {
        const VIEWER_SCRIPT_URL = 'https://viewer.diagrams.net/js/viewer-static.min.js';
        const params = new URLSearchParams(window.location.search || '');
        const source = params.get('src') || '';
        const title = params.get('title') || 'draw.io';
        const statusEl = document.getElementById('status');
        const rootEl = document.getElementById('root');

        document.title = title;

        if (!source) {
          statusEl.textContent = 'Missing draw.io source';
          return;
        }

        const normalizedSource = new URL(source, window.location.href).toString();
        const payload = {
          url: normalizedSource,
          highlight: '#4f8cff',
          resize: 1,
          fit: 1,
          page: 0,
          border: 0,
          dark: 'auto',
        };

        rootEl.setAttribute('data-mxgraph', JSON.stringify(payload));

        const script = document.createElement('script');
        script.src = VIEWER_SCRIPT_URL;
        script.onload = function onViewerLoaded() {
          statusEl.classList.add('hidden');

          if (window.GraphViewer && typeof window.GraphViewer.createViewerForElement === 'function') {
            window.GraphViewer.createViewerForElement(rootEl, function onViewerReady(viewer) {
              function syncFrameHeight() {
                const frame = window.frameElement;

                if (!frame || !viewer || !viewer.graph || typeof viewer.graph.getGraphBounds !== 'function') {
                  return;
                }

                const bounds = viewer.graph.getGraphBounds();
                const graphWidth = bounds && Number.isFinite(bounds.width) && bounds.width > 0 ? bounds.width : 0;
                const graphHeight =
                  bounds && Number.isFinite(bounds.height) && bounds.height > 0 ? bounds.height : 0;

                if (!graphWidth || !graphHeight) {
                  return;
                }

                const currentWidth = frame.clientWidth || rootEl.clientWidth || document.documentElement.clientWidth;
                const requestedHeight = Number.parseFloat(frame.getAttribute('height') || '');
                const naturalHeight = currentWidth * (graphHeight / graphWidth);
                let nextHeight = naturalHeight;

                if (Number.isFinite(requestedHeight) && requestedHeight > 0) {
                  nextHeight = Math.min(requestedHeight, nextHeight);
                }

                frame.style.aspectRatio = '';
                frame.style.minHeight = '0';
                frame.style.height = `${Math.max(1, Math.round(nextHeight))}px`;
              }

              function fitViewer() {
                if (!viewer || !viewer.graph) {
                  return;
                }

                const graph = viewer.graph;
                const container = graph.container;

                if (container) {
                  container.style.width = '100%';
                  container.style.height = '100%';
                  container.style.overflow = 'hidden';
                }

                if (typeof graph.fit === 'function') {
                  graph.fit(8);
                }

                syncFrameHeight();
              }

              requestAnimationFrame(function afterFrame() {
                requestAnimationFrame(function fitAfterFrame() {
                  fitViewer();
                  requestAnimationFrame(fitViewer);
                });
              });

              if (typeof ResizeObserver !== 'undefined') {
                const observer = new ResizeObserver(fitViewer);

                observer.observe(document.body);
                observer.observe(rootEl);
                if (window.frameElement) {
                  observer.observe(window.frameElement);
                }
              } else {
                window.addEventListener('resize', fitViewer);
              }
            });

            return;
          }

          rootEl.textContent = 'Failed to initialize draw.io viewer';
        };
        script.onerror = function onViewerFailed() {
          statusEl.textContent = 'Failed to load draw.io viewer';
        };

        document.head.appendChild(script);
      })();
    </script>
  </body>
</html>
