<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excalidraw Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #status,
      #root {
        width: 100%;
      }

      #status {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 96px;
        color: #5f6b7a;
        background: transparent;
        text-align: center;
        font-size: 14px;
      }

      #status.hidden {
        display: none;
      }

      #root {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        overflow: hidden;
      }

      #root svg {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading Excalidraw scene…</div>
    <div id="root" aria-label="Excalidraw scene"></div>

    <script type="module">
      (async function initExcalidrawViewer() {
        const EXPORT_MODULE_URL = 'https://esm.sh/@excalidraw/excalidraw@0.18.0?bundle';
        const EXCALIDRAW_SHARE_FILES_BUCKET = 'excalidraw-room-persistence.appspot.com';
        const EXCALIDRAW_SHARE_FILES_PREFIX = '/files/shareLinks';
        const DEFAULT_BINARY_MIME_TYPE = 'application/octet-stream';
        const params = new URLSearchParams(window.location.search || '');
        const source = params.get('src') || '';
        const title = params.get('title') || 'Excalidraw';
        const statusEl = document.getElementById('status');
        const rootEl = document.getElementById('root');

        document.title = title;

        if (!source) {
          statusEl.textContent = 'Missing Excalidraw source';
          return;
        }

        function setStatus(message) {
          statusEl.textContent = message;
          statusEl.classList.remove('hidden');
          rootEl.innerHTML = '';
        }

        function isExcalidrawJsonShareUrl(rawValue) {
          try {
            const url = new URL(rawValue, window.location.href);
            const host = String(url.hostname || '').toLowerCase().replace(/^www\./, '');

            return (
              (host === 'excalidraw.com' || host === 'app.excalidraw.com') &&
              String(url.hash || '').startsWith('#json=')
            );
          } catch (_error) {
            return false;
          }
        }

        function parseExcalidrawJsonShare(rawValue) {
          const url = new URL(rawValue, window.location.href);
          const encodedPayload = String(url.hash || '').replace(/^#json=/, '');
          const commaIndex = encodedPayload.indexOf(',');

          if (commaIndex < 0) {
            throw new Error('Malformed Excalidraw share link');
          }

          return {
            documentId: encodedPayload.slice(0, commaIndex),
            key: encodedPayload.slice(commaIndex + 1),
          };
        }

        function splitBuffers(bytes) {
          const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
          let cursor = 0;

          if (bytes.byteLength < 4) {
            throw new Error('Excalidraw payload is too short');
          }

          const version = view.getUint32(cursor);

          if (version > 1) {
            throw new Error('Unsupported Excalidraw payload version');
          }

          cursor += 4;

          const chunks = [];

          while (cursor < bytes.byteLength) {
            if (cursor + 4 > bytes.byteLength) {
              throw new Error('Malformed Excalidraw payload');
            }

            const chunkSize = view.getUint32(cursor);

            cursor += 4;

            const end = Math.min(cursor + chunkSize, bytes.byteLength);

            chunks.push(bytes.slice(cursor, end));
            cursor = end;
          }

          return chunks;
        }

        function decodeBase64Url(value) {
          const normalized = String(value || '').replace(/-/g, '+').replace(/_/g, '/');
          const padded = normalized.padEnd(Math.ceil(normalized.length / 4) * 4, '=');
          const decoded = window.atob(padded);
          const bytes = new Uint8Array(decoded.length);

          for (let i = 0; i < decoded.length; i += 1) {
            bytes[i] = decoded.charCodeAt(i);
          }

          return bytes;
        }

        async function decryptSharedPayload(payload, iv, keyText) {
          const cryptoKey = await window.crypto.subtle.importKey(
            'raw',
            decodeBase64Url(keyText),
            { name: 'AES-GCM' },
            false,
            ['decrypt']
          );
          const decrypted = await window.crypto.subtle.decrypt(
            { name: 'AES-GCM', iv },
            cryptoKey,
            payload
          );

          return new Uint8Array(decrypted);
        }

        async function inflateZlib(bytes) {
          if (typeof DecompressionStream !== 'undefined') {
            const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate'));
            const buffer = await new Response(stream).arrayBuffer();

            return new Uint8Array(buffer);
          }

          const { unzlibSync } = await import('https://esm.sh/fflate@0.8.2?bundle');

          return unzlibSync(bytes);
        }

        async function decompressSharedFile(bufferView, decryptionKey) {
          const [encodingMetadataBuffer, iv, encryptedBuffer] = splitBuffers(bufferView);
          const encodingMetadata = JSON.parse(
            new TextDecoder().decode(encodingMetadataBuffer || new Uint8Array())
          );
          const decrypted = await decryptSharedPayload(encryptedBuffer, iv, decryptionKey);
          const decoded = encodingMetadata && encodingMetadata.compression
            ? await inflateZlib(decrypted)
            : decrypted;
          const [metadataBuffer, contentsBuffer] = splitBuffers(decoded);
          const metadata = JSON.parse(new TextDecoder().decode(metadataBuffer || new Uint8Array()));

          return { metadata, data: contentsBuffer };
        }

        async function loadSharedFilesForScene(scene, documentId, decryptionKey) {
          const imageFileIds = Array.from(
            new Set(
              (Array.isArray(scene?.elements) ? scene.elements : [])
                .filter((element) => element && element.type === 'image' && element.fileId)
                .map((element) => String(element.fileId))
                .filter(Boolean)
            )
          );

          if (!imageFileIds.length) {
            return scene.files || {};
          }

          const nextFiles = { ...(scene.files || {}) };

          await Promise.all(
            imageFileIds.map(async (fileId) => {
              if (nextFiles[fileId]) {
                return;
              }

              try {
                const objectPath =
                  `${encodeURIComponent(`${EXCALIDRAW_SHARE_FILES_PREFIX.replace(/^\//, '')}/${documentId}`)}` +
                  `%2F${encodeURIComponent(fileId)}`;
                const response = await fetch(
                  `https://firebasestorage.googleapis.com/v0/b/${EXCALIDRAW_SHARE_FILES_BUCKET}/o/${objectPath}?alt=media`
                );

                if (!response.ok) {
                  return;
                }

                const encryptedBytes = new Uint8Array(await response.arrayBuffer());
                const { metadata, data } = await decompressSharedFile(encryptedBytes, decryptionKey);

                nextFiles[fileId] = {
                  mimeType: String((metadata && metadata.mimeType) || DEFAULT_BINARY_MIME_TYPE),
                  id: fileId,
                  dataURL: new TextDecoder().decode(data),
                  created: Number((metadata && metadata.created) || Date.now()),
                  lastRetrieved: Number((metadata && metadata.created) || Date.now()),
                };
              } catch (_error) {
                // Ignore missing or failed file fetches and render what we can.
              }
            })
          );

          return nextFiles;
        }

        function getSceneBounds(elements) {
          let minX = Infinity;
          let minY = Infinity;
          let maxX = -Infinity;
          let maxY = -Infinity;

          elements.forEach((element) => {
            if (!element || element.isDeleted) {
              return;
            }

            const originX = Number.isFinite(element.x) ? Number(element.x) : 0;
            const originY = Number.isFinite(element.y) ? Number(element.y) : 0;
            let localMinX = originX;
            let localMinY = originY;
            let localMaxX = originX;
            let localMaxY = originY;

            if (Array.isArray(element.points) && element.points.length) {
              element.points.forEach((point) => {
                if (!Array.isArray(point) || point.length < 2) {
                  return;
                }

                const px = originX + (Number(point[0]) || 0);
                const py = originY + (Number(point[1]) || 0);

                localMinX = Math.min(localMinX, px);
                localMinY = Math.min(localMinY, py);
                localMaxX = Math.max(localMaxX, px);
                localMaxY = Math.max(localMaxY, py);
              });
            } else {
              const width = Number.isFinite(element.width) ? Number(element.width) : 0;
              const height = Number.isFinite(element.height) ? Number(element.height) : 0;

              localMinX = Math.min(originX, originX + width);
              localMinY = Math.min(originY, originY + height);
              localMaxX = Math.max(originX, originX + width);
              localMaxY = Math.max(originY, originY + height);
            }

            minX = Math.min(minX, localMinX);
            minY = Math.min(minY, localMinY);
            maxX = Math.max(maxX, localMaxX);
            maxY = Math.max(maxY, localMaxY);
          });

          if (!Number.isFinite(minX) || !Number.isFinite(minY) || !Number.isFinite(maxX) || !Number.isFinite(maxY)) {
            return null;
          }

          return {
            x: minX,
            y: minY,
            width: Math.max(1, maxX - minX),
            height: Math.max(1, maxY - minY),
          };
        }

        function syncFrameHeight(svg) {
          const frame = window.frameElement;

          if (!frame || !svg) {
            return;
          }

          const viewBox = svg.getAttribute('viewBox') || '';
          const parts = viewBox.trim().split(/\s+/);
          const svgWidth = Number.parseFloat(parts[2] || '');
          const svgHeight = Number.parseFloat(parts[3] || '');

          if (!Number.isFinite(svgWidth) || !Number.isFinite(svgHeight) || svgWidth <= 0 || svgHeight <= 0) {
            return;
          }

          const currentWidth = frame.clientWidth || rootEl.clientWidth || document.documentElement.clientWidth;
          const naturalHeight = currentWidth * (svgHeight / svgWidth);

          frame.style.aspectRatio = '';
          frame.style.minHeight = '0';
          frame.style.height = `${Math.max(1, Math.round(naturalHeight))}px`;
        }

        function normalizePadding(padding) {
          if (typeof padding === 'number') {
            return {
              top: padding,
              right: padding,
              bottom: padding,
              left: padding,
            };
          }

          return {
            top: Number.isFinite(padding?.top) ? padding.top : 0,
            right: Number.isFinite(padding?.right) ? padding.right : 0,
            bottom: Number.isFinite(padding?.bottom) ? padding.bottom : 0,
            left: Number.isFinite(padding?.left) ? padding.left : 0,
          };
        }

        function cropSvgToContent(svg, padding = 6) {
          if (!svg || typeof svg.getBBox !== 'function') {
            return;
          }

          const bbox = svg.getBBox();
          const edges = normalizePadding(padding);

          if (
            !Number.isFinite(bbox.x) ||
            !Number.isFinite(bbox.y) ||
            !Number.isFinite(bbox.width) ||
            !Number.isFinite(bbox.height) ||
            bbox.width <= 0 ||
            bbox.height <= 0
          ) {
            return;
          }

          const nextX = bbox.x - edges.left;
          const nextY = bbox.y - edges.top;
          const nextWidth = bbox.width + edges.left + edges.right;
          const nextHeight = bbox.height + edges.top + edges.bottom;

          svg.setAttribute('viewBox', `${nextX} ${nextY} ${nextWidth} ${nextHeight}`);
          svg.setAttribute('width', String(nextWidth));
          svg.setAttribute('height', String(nextHeight));
          svg.setAttribute('preserveAspectRatio', 'xMinYMin meet');
        }

        function cropSvgToSceneBounds(svg, scene, padding = 12) {
          const bounds = getSceneBounds(Array.isArray(scene?.elements) ? scene.elements : []);
          const edges = normalizePadding(padding);

          if (!bounds) {
            cropSvgToContent(svg, padding);
            return;
          }

          const nextX = bounds.x - edges.left;
          const nextY = bounds.y - edges.top;
          const nextWidth = bounds.width + edges.left + edges.right;
          const nextHeight = bounds.height + edges.top + edges.bottom;

          svg.setAttribute('viewBox', `${nextX} ${nextY} ${nextWidth} ${nextHeight}`);
          svg.setAttribute('width', String(nextWidth));
          svg.setAttribute('height', String(nextHeight));
          svg.setAttribute('preserveAspectRatio', 'xMinYMin meet');
        }

        function cropSvgToBestBounds(svg, scene, padding = 12) {
          if (!svg || typeof svg.getBBox !== 'function') {
            cropSvgToSceneBounds(svg, scene, padding);
            return;
          }

          const bbox = svg.getBBox();

          if (
            Number.isFinite(bbox.x) &&
            Number.isFinite(bbox.y) &&
            Number.isFinite(bbox.width) &&
            Number.isFinite(bbox.height) &&
            bbox.width > 0 &&
            bbox.height > 0
          ) {
            cropSvgToContent(svg, padding);
            return;
          }

          cropSvgToSceneBounds(svg, scene, padding);
        }

        function parseViewBox(svg) {
          const viewBox = String(svg.getAttribute('viewBox') || '')
            .trim()
            .split(/\s+/)
            .map((part) => Number.parseFloat(part));

          if (viewBox.length !== 4 || viewBox.some((part) => !Number.isFinite(part))) {
            return null;
          }

          const [x, y, width, height] = viewBox;

          if (width <= 0 || height <= 0) {
            return null;
          }

          return { x, y, width, height };
        }

        function expandViewBoxToBBox(svg, padding = 6) {
          if (!svg || typeof svg.getBBox !== 'function') {
            return false;
          }

          const current = parseViewBox(svg);
          const bbox = svg.getBBox();
          const edges = normalizePadding(padding);

          if (
            !current ||
            !Number.isFinite(bbox.x) ||
            !Number.isFinite(bbox.y) ||
            !Number.isFinite(bbox.width) ||
            !Number.isFinite(bbox.height) ||
            bbox.width <= 0 ||
            bbox.height <= 0
          ) {
            return false;
          }

          const bboxMinX = bbox.x - edges.left;
          const bboxMinY = bbox.y - edges.top;
          const bboxMaxX = bbox.x + bbox.width + edges.right;
          const bboxMaxY = bbox.y + bbox.height + edges.bottom;
          const currentMinX = current.x;
          const currentMinY = current.y;
          const currentMaxX = current.x + current.width;
          const currentMaxY = current.y + current.height;
          const nextMinX = Math.min(currentMinX, bboxMinX);
          const nextMinY = Math.min(currentMinY, bboxMinY);
          const nextMaxX = Math.max(currentMaxX, bboxMaxX);
          const nextMaxY = Math.max(currentMaxY, bboxMaxY);

          if (
            Math.abs(nextMinX - currentMinX) < 0.5 &&
            Math.abs(nextMinY - currentMinY) < 0.5 &&
            Math.abs(nextMaxX - currentMaxX) < 0.5 &&
            Math.abs(nextMaxY - currentMaxY) < 0.5
          ) {
            return false;
          }

          const nextWidth = Math.max(1, nextMaxX - nextMinX);
          const nextHeight = Math.max(1, nextMaxY - nextMinY);

          svg.setAttribute('viewBox', `${nextMinX} ${nextMinY} ${nextWidth} ${nextHeight}`);
          svg.setAttribute('width', String(nextWidth));
          svg.setAttribute('height', String(nextHeight));
          svg.setAttribute('preserveAspectRatio', 'xMinYMin meet');

          return true;
        }

        async function loadSharedExcalidrawScene(sourceUrl) {
          const { documentId, key } = parseExcalidrawJsonShare(sourceUrl);
          const encryptedResponse = await fetch(`https://json.excalidraw.com/api/v2/${documentId}`);

          if (!encryptedResponse.ok) {
            throw new Error(`Failed to load Excalidraw share (${encryptedResponse.status})`);
          }

          const encryptedBytes = new Uint8Array(await encryptedResponse.arrayBuffer());
          const [/* metadata */, iv, payload] = splitBuffers(encryptedBytes);
          const decrypted = await decryptSharedPayload(payload, iv, key);
          const inflated = await inflateZlib(decrypted);
          const nestedBuffers = splitBuffers(inflated);
          const sceneText = new TextDecoder().decode(nestedBuffers[1] || new Uint8Array());
          const scene = JSON.parse(sceneText);

          scene.files = await loadSharedFilesForScene(scene, documentId, key);

          return scene;
        }

        async function loadScene(sourceUrl) {
          if (isExcalidrawJsonShareUrl(sourceUrl)) {
            return loadSharedExcalidrawScene(sourceUrl);
          }

          const normalizedSource = new URL(sourceUrl, window.location.href).toString();
          const sceneResponse = await fetch(normalizedSource);

          if (!sceneResponse.ok) {
            throw new Error(`Failed to load Excalidraw scene (${sceneResponse.status})`);
          }

          return sceneResponse.json();
        }

        try {
          const scene = await loadScene(source);
          const isSharedScene = isExcalidrawJsonShareUrl(source);
          const scenePadding = isSharedScene ? 18 : 12;
          const module = await import(EXPORT_MODULE_URL);
          const exportToSvg = module.exportToSvg;

          if (typeof exportToSvg !== 'function') {
            throw new Error('Excalidraw exportToSvg API is unavailable');
          }

          const prefersDark = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          const appState = {
            ...(scene.appState || {}),
            exportBackground: false,
            exportWithDarkMode: Boolean(prefersDark),
            viewBackgroundColor: 'transparent',
          };
          const svg = await exportToSvg({
            elements: Array.isArray(scene.elements) ? scene.elements : [],
            appState,
            files: scene.files || {},
            exportPadding: isSharedScene ? 18 : 12,
          });

          rootEl.innerHTML = '';
          rootEl.appendChild(svg);
          cropSvgToBestBounds(svg, scene, scenePadding);

          statusEl.classList.add('hidden');

          const sync = () => {
            expandViewBoxToBBox(svg, scenePadding);
            syncFrameHeight(svg);
          };

          requestAnimationFrame(() => {
            requestAnimationFrame(sync);
          });

          if (document.fonts && typeof document.fonts.ready?.then === 'function') {
            document.fonts.ready.then(() => {
              requestAnimationFrame(sync);
            });
          }

          if (typeof ResizeObserver !== 'undefined') {
            const observer = new ResizeObserver(sync);

            observer.observe(document.body);
            observer.observe(rootEl);
            if (window.frameElement) {
              observer.observe(window.frameElement);
            }
          } else {
            window.addEventListener('resize', sync);
          }
        } catch (error) {
          setStatus(error instanceof Error ? error.message : 'Failed to render Excalidraw scene');
        }
      })();
    </script>
  </body>
</html>
