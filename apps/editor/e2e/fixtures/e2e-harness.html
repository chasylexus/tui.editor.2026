<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor E2E Harness</title>
    <link rel="stylesheet" href="/dist/cdn/td-editor.css" />
    <link rel="stylesheet" href="/dist/cdn/theme/td-editor-dark.css" />
    <link rel="stylesheet" href="/node_modules/katex/dist/katex.min.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #f5f7fb;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #host {
        width: 960px;
        margin: 24px auto;
      }
    </style>
  </head>
  <body>
    <div id="host">
      <div id="editor"></div>
    </div>

    <script src="/dist/cdn/td-editor-all.js"></script>
    <script src="/node_modules/@techie_doubts/tui.chart.2026/dist/td-chart.js"></script>
    <script src="/plugins/chart/dist/cdn/td-editor-plugin-chart.js"></script>
    <script src="/plugins/katex/dist/cdn/td-editor-plugin-katex.js"></script>
    <script>
      (function initHarness() {
        const Editor = toastui.Editor;
        const chart = Editor.plugin.chart;
        const katex = Editor.plugin.katex;
        const chartOptions = {
          minWidth: 0,
          maxWidth: Infinity,
          minHeight: 0,
          maxHeight: Infinity,
        };
        const host = document.getElementById('host');
        const editor = new Editor({
          el: document.getElementById('editor'),
          previewStyle: 'vertical',
          height: '720px',
          initialEditType: 'wysiwyg',
          initialValue: '',
          usageStatistics: false,
          hooks: {
            resolveMediaPath(mediaPath) {
              const raw = String(mediaPath || '').trim();

              if (!raw || /^(https?:|data:|blob:)/i.test(raw)) {
                return raw;
              }

              if (raw.startsWith('~/') || raw.startsWith('/')) {
                return `/__local_media?path=${encodeURIComponent(raw)}`;
              }

              return raw;
            },
          },
          plugins: [[chart, chartOptions], katex],
        });

        function waitFrames(count) {
          return new Promise((resolve) => {
            const step = () => {
              if (count <= 0) {
                resolve();
                return;
              }

              count -= 1;
              requestAnimationFrame(step);
            };

            requestAnimationFrame(step);
          });
        }

        function getRootEl() {
          return document.querySelector('.toastui-editor-defaultUI, .td-editor-defaultUI');
        }

        function focusByText(needle, offset) {
          const ww = editor.wwEditor;
          const doc = ww.view.state.doc;
          let target = null;

          doc.descendants((node, pos) => {
            if (!node.isText) {
              return true;
            }

            const text = node.text || '';
            const idx = text.indexOf(needle);

            if (idx >= 0) {
              target = pos + idx + offset;
              return false;
            }

            return true;
          });

          if (typeof target === 'number') {
            editor.setSelection(target, target);
            ww.view.focus();
          }

          return target;
        }

        function findTextRange(needle, occurrence, length) {
          const ww = editor.wwEditor;
          const doc = ww.view.state.doc;
          let matchCount = 0;
          let found = null;

          doc.descendants((node, pos) => {
            if (!node.isText) {
              return true;
            }

            const text = node.text || '';
            let searchFrom = 0;

            while (searchFrom <= text.length) {
              const idx = text.indexOf(needle, searchFrom);

              if (idx < 0) {
                break;
              }

              if (matchCount === occurrence) {
                const from = pos + idx;
                const to = from + (length || needle.length);

                found = { from, to };
                return false;
              }

              matchCount += 1;
              searchFrom = idx + Math.max(needle.length, 1);
            }

            return true;
          });

          return found;
        }

        function getInlineLatexState() {
          const ww = editor.wwEditor;
          const view = ww.view;
          const plugin = view.state.plugins.find((item) => item.key === 'inlineLatexWysiwyg$');
          const state = plugin ? plugin.getState(view.state) : null;
          const root = editor.getEditorElements().wwEditor;
          const editing = root.querySelector('.toastui-inline-latex-editing');
          const preview = root.querySelector('.toastui-inline-latex-live-preview');

          return {
            state: state
              ? {
                  editRange: state.editRange,
                  stableContent: state.stableContent,
                  lineBreakPositions: state.lineBreakPositions,
                }
              : null,
            breakCount: root.querySelectorAll('.toastui-inline-latex-editing-break').length,
            selection: {
              from: view.state.selection.from,
              to: view.state.selection.to,
            },
            editingText: editing ? editing.textContent : null,
            previewTop:
              editing && preview
                ? preview.getBoundingClientRect().top - editing.getBoundingClientRect().top
                : null,
          };
        }

        function getChartBox() {
          const container = document.querySelector('[data-chart-id]');
          const chartNode = container && (container.querySelector('svg') || container.querySelector('canvas'));

          if (!container || !chartNode) {
            return null;
          }

          const computedStyle = getComputedStyle(chartNode);
          const styleWidth = parseFloat(computedStyle.width) || 0;
          const styleHeight = parseFloat(computedStyle.height) || 0;
          const attrWidth =
            typeof chartNode.width === 'number' ? chartNode.width : Number(chartNode.getAttribute('width') || 0);
          const attrHeight =
            typeof chartNode.height === 'number'
              ? chartNode.height
              : Number(chartNode.getAttribute('height') || 0);
          const width = styleWidth || attrWidth;
          const height = styleHeight || attrHeight;

          return {
            tagName: chartNode.tagName.toLowerCase(),
            container: {
              width: host.clientWidth,
              height: host.clientHeight,
            },
            chart: {
              width,
              height,
            },
            ratio: height ? width / height : 0,
          };
        }

        function getMobileToolbarMetrics() {
          const root = getRootEl();
          const toolbar = root?.querySelector('.toastui-editor-toolbar');
          const toolbarInner = root?.querySelector('.toastui-editor-defaultUI-toolbar');
          const main = root?.querySelector('.toastui-editor-main');
          const contents = root?.querySelector(
            '.toastui-editor-ww-container .toastui-editor-contents.ProseMirror'
          );
          const toolbarButton = toolbarInner?.querySelector('button');
          const rootBox = root?.getBoundingClientRect();
          const toolbarBox = toolbar?.getBoundingClientRect();
          const mainStyle = main ? getComputedStyle(main) : null;
          const toolbarStyle = toolbar ? getComputedStyle(toolbar) : null;
          const contentStyle = contents ? getComputedStyle(contents) : null;
          const toolbarButtonStyle = toolbarButton ? getComputedStyle(toolbarButton) : null;

          return {
            isMobile: Boolean(root?.classList.contains('toastui-editor-mobile-device')),
            root: rootBox
              ? {
                  left: rootBox.left,
                  width: rootBox.width,
                }
              : null,
            toolbar: toolbar && toolbarInner && toolbarBox && toolbarStyle
              ? {
                  position: toolbarStyle.position,
                  bottom: toolbarStyle.bottom,
                  width: toolbarBox.width,
                  height: toolbarBox.height,
                  left: toolbarBox.left,
                  scrollWidth: toolbar.scrollWidth,
                  clientWidth: toolbar.clientWidth,
                  innerScrollWidth: toolbarInner.scrollWidth,
                  innerClientWidth: toolbarInner.clientWidth,
                }
              : null,
            main: main && mainStyle
              ? {
                  paddingBottom: mainStyle.paddingBottom,
                }
              : null,
            contents: contents
              ? {
                  scrollHeight: contents.scrollHeight,
                  clientHeight: contents.clientHeight,
                  fontSize: contentStyle?.fontSize || null,
                  paddingLeft: contentStyle?.paddingLeft || null,
                  paddingRight: contentStyle?.paddingRight || null,
                  paddingTop: contentStyle?.paddingTop || null,
                }
              : null,
            toolbarButton: toolbarButton && toolbarButtonStyle
              ? {
                  width: toolbarButtonStyle.width,
                  height: toolbarButtonStyle.height,
                }
              : null,
          };
        }

        window.__HARNESS__ = {
          async setMarkdown(markdown) {
            editor.setMarkdown(markdown);
            await waitFrames(6);
          },
          async changeMode(mode) {
            editor.changeMode(mode);
            await waitFrames(6);
          },
          async setTheme(theme) {
            const root = getRootEl();
            const useDark = theme === 'dark';

            if (root) {
              root.classList.toggle('toastui-editor-dark', useDark);
              root.classList.toggle('td-editor-dark', useDark);
            }

            if (typeof editor.setTheme === 'function') {
              editor.setTheme(useDark ? 'dark' : 'light');
            }

            await waitFrames(6);
          },
          async setHostWidth(width) {
            host.style.width = width + 'px';
            window.dispatchEvent(new Event('resize'));
            await waitFrames(8);
          },
          async setMobileTextZoom(scale) {
            const root = getRootEl();

            if (root instanceof HTMLElement) {
              root.style.setProperty('--toastui-editor-text-zoom', String(scale));
            }
            await waitFrames(4);
          },
          async focusByText(needle, offset) {
            const target = focusByText(needle, offset);

            await waitFrames(2);
            return target;
          },
          async selectText(needle, occurrence = 0, length) {
            const range = findTextRange(needle, occurrence, length);

            if (!range) {
              return null;
            }

            editor.setSelection(range.from, range.to);
            editor.wwEditor.view.focus();
            await waitFrames(2);

            return range;
          },
          async copySelection() {
            const wwRoot = editor
              .getEditorElements()
              .wwEditor.querySelector('.toastui-editor-contents.ProseMirror');

            if (!wwRoot) {
              return { defaultPrevented: false, data: {} };
            }

            wwRoot.focus();

            const event = new Event('copy', { bubbles: true, cancelable: true });
            const store = {};
            const clipboardData = {
              setData(type, value) {
                store[type] = value;
              },
              getData(type) {
                return store[type] || '';
              },
            };

            Object.defineProperty(event, 'clipboardData', {
              value: clipboardData,
            });

            wwRoot.dispatchEvent(event);
            await waitFrames(2);

            return {
              defaultPrevented: event.defaultPrevented,
              data: store,
            };
          },
          async pasteClipboard(data) {
            const wwRoot = editor
              .getEditorElements()
              .wwEditor.querySelector('.toastui-editor-contents.ProseMirror');

            if (!wwRoot) {
              return { defaultPrevented: false, markdown: editor.getMarkdown() };
            }

            wwRoot.focus();

            const event = new Event('paste', { bubbles: true, cancelable: true });
            const clipboardData = {
              getData(type) {
                return data[type] || '';
              },
              items: Object.keys(data).map((type) => ({ kind: 'string', type })),
            };

            Object.defineProperty(event, 'clipboardData', {
              value: clipboardData,
            });

            wwRoot.dispatchEvent(event);
            await waitFrames(4);

            return {
              defaultPrevented: event.defaultPrevented,
              markdown: editor.getMarkdown(),
            };
          },
          async waitForIdle(frames) {
            await waitFrames(frames || 8);
          },
          async pastePlainText(text) {
            const wwRoot = editor
              .getEditorElements()
              .wwEditor.querySelector('.toastui-editor-contents.ProseMirror');

            if (!wwRoot) {
              return { defaultPrevented: false, markdown: editor.getMarkdown() };
            }

            wwRoot.focus();

            const event = new Event('paste', { bubbles: true, cancelable: true });
            const clipboardData = {
              getData(type) {
                return type === 'text/plain' ? text : '';
              },
              items: [{ kind: 'string', type: 'text/plain' }],
            };

            Object.defineProperty(event, 'clipboardData', {
              value: clipboardData,
            });

            wwRoot.dispatchEvent(event);
            await waitFrames(4);

            return {
              defaultPrevented: event.defaultPrevented,
              markdown: editor.getMarkdown(),
            };
          },
          getMarkdown() {
            return editor.getMarkdown();
          },
          getInlineLatexState,
          getChartBox,
          getMobileToolbarMetrics,
          isReady() {
            return true;
          },
        };
      })();
    </script>
  </body>
</html>
