<!DOCTYPE html>
<html>
  <head lang="en">
    <meta charset="UTF-8" />
    <title>20. Full Featured 2026</title>
    <link rel="stylesheet" href="./css/tuidoc-example-style.css" />
    <!-- Editor -->
    <link rel="stylesheet" href="/dist/cdn/td-editor.css" />
    <!-- Dark theme -->
    <link rel="stylesheet" href="/dist/cdn/theme/td-editor-dark.css" />
    <!-- Chart -->
    <link rel="stylesheet" href="/node_modules/@techie_doubts/tui.chart.2026/dist/td-chart.css" />
    <!-- Code Highlight -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.23.0/themes/prism.min.css"
    />
    <link
      rel="stylesheet"
      href="/plugins/code-syntax-highlight/dist/cdn/td-editor-plugin-code-syntax-highlight.css"
    />
    <!-- Color syntax -->
    <link
      rel="stylesheet"
      href="/node_modules/@techie_doubts/tui.color-picker.2026/dist/tui-color-picker.css"
    />
    <link
      rel="stylesheet"
      href="/plugins/color-syntax/dist/cdn/td-editor-plugin-color-syntax.css"
    />
    <!-- Merged Table -->
    <link
      rel="stylesheet"
      href="/plugins/table-merged-cell/dist/cdn/td-editor-plugin-table-merged-cell.css"
    />
    <!-- Export -->
    <link
      rel="stylesheet"
      href="/plugins/export/dist/cdn/td-editor-plugin-export.css"
    />
    <!-- KaTeX -->
    <link rel="stylesheet" href="/node_modules/katex/dist/katex.min.css" />
    <style>
      html,
      body,
      #app {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
      }

      .page {
        height: 100%;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .code-html.tui-doc-contents {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
      }

      #editor {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      .toastui-editor-defaultUI,
      .td-editor-defaultUI {
        height: 100%;
      }

      body.dark {
        background: #111;
      }

      .export-split-icon.theme-split-icon {
        background-color: transparent;
        mask-image: none;
        -webkit-mask-image: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .export-split-icon.theme-split-icon svg {
        display: block;
      }

      .export-split > .export-split-main:only-child {
        border-right: 1px solid #f7f9fc;
        border-radius: 3px;
      }

      .toastui-editor-dark .export-split > .export-split-main:only-child,
      .td-editor-dark .export-split > .export-split-main:only-child {
        border-right: 1px solid #232428;
      }

      .export-menu-icon.theme-menu-icon {
        background-color: transparent;
        mask-image: none;
        -webkit-mask-image: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .export-menu-icon.theme-menu-icon svg {
        display: block;
      }

      .toastui-editor-defaultUI-toolbar .export-toolbar-group,
      .td-editor-defaultUI-toolbar .export-toolbar-group {
        margin-left: auto;
      }

      .toastui-editor-defaultUI-toolbar .export-toolbar-group .toastui-editor-toolbar-divider,
      .td-editor-defaultUI-toolbar .export-toolbar-group .td-editor-toolbar-divider {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app" class="page">
      <div class="code-html tui-doc-contents">
        <!-- Editor -->
        <div id="editor"></div>
      </div>
    </div>
    <script src="./data/example20-full-featured-2026.js"></script>
    <!-- Editor -->
    <script src="/dist/cdn/td-editor-all.js"></script>
    <!-- Chart -->
    <script src="/node_modules/@techie_doubts/tui.chart.2026/dist/td-chart.js"></script>
    <!-- Color Picker -->
    <script src="/node_modules/@techie_doubts/tui.color-picker.2026/dist/tui-color-picker.js"></script>
    <!-- Mermaid -->
    <script src="/node_modules/mermaid/dist/mermaid.min.js"></script>
    <!-- Prism (required before code-syntax-highlight-all bundle) -->
    <script src="/node_modules/prismjs/prism.js"></script>
    <!-- Editor's Plugin -->
    <script src="/plugins/chart/dist/cdn/td-editor-plugin-chart.js"></script>
    <script src="/plugins/code-syntax-highlight/dist/cdn/td-editor-plugin-code-syntax-highlight-all.js"></script>
    <script src="/plugins/color-syntax/dist/cdn/td-editor-plugin-color-syntax.js"></script>
    <script src="/plugins/table-merged-cell/dist/cdn/td-editor-plugin-table-merged-cell.js"></script>
    <script src="/plugins/uml/dist/cdn/td-editor-plugin-uml.js"></script>
    <script src="/plugins/sequence/dist/cdn/td-editor-plugin-sequence.js"></script>
    <script src="/plugins/flowchart/dist/cdn/td-editor-plugin-flowchart.js"></script>
    <script src="/plugins/graphviz/dist/cdn/td-editor-plugin-graphviz.js"></script>
    <script src="/plugins/abc/dist/cdn/td-editor-plugin-abc.js"></script>
    <script src="/plugins/mermaid/dist/cdn/td-editor-plugin-mermaid.js"></script>
    <script src="/plugins/katex/dist/cdn/td-editor-plugin-katex.js"></script>
    <script src="/plugins/export/dist/cdn/td-editor-plugin-export.js"></script>
    <script>
      (function setupExample20Debug() {
        function ensurePanel() {
          var existing = document.getElementById('example20-error-panel');
          if (existing) {
            return existing;
          }

          var panel = document.createElement('pre');
          panel.id = 'example20-error-panel';
          panel.style.position = 'fixed';
          panel.style.inset = '0';
          panel.style.margin = '0';
          panel.style.padding = '16px';
          panel.style.background = '#111';
          panel.style.color = '#f5f5f5';
          panel.style.whiteSpace = 'pre-wrap';
          panel.style.overflow = 'auto';
          panel.style.font = '12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace';
          panel.style.zIndex = '99999';
          panel.style.display = 'none';
          document.body.appendChild(panel);
          return panel;
        }

        window.__ex20ShowError = function(message) {
          var panel = ensurePanel();
          panel.style.display = 'block';
          panel.textContent = String(message || 'Unknown example20 error');
        };

        window.addEventListener('error', function(event) {
          var details = event && event.error && event.error.stack
            ? event.error.stack
            : (event && event.message) || 'window.error without message';
          window.__ex20ShowError('[window.error]\\n' + details);
        });

        window.addEventListener('unhandledrejection', function(event) {
          var reason = event && event.reason;
          var details = reason && reason.stack ? reason.stack : String(reason);
          window.__ex20ShowError('[unhandledrejection]\\n' + details);
        });
      })();
    </script>
    <script type="text/javascript" class="code-js">
      try {
      const { Editor } = toastui;
      const {
        chart,
        codeSyntaxHighlight,
        colorSyntax,
        tableMergedCell,
        uml,
        sequence,
        flowchart,
        graphviz,
        abc,
        mermaid,
        katex,
        export: exportPlugin
      } = Editor.plugin;

      const chartOptions = {
        minWidth: 100,
        maxWidth: 600,
        minHeight: 100,
        maxHeight: 300
      };

      const LOCAL_MEDIA_ENDPOINT = '/__local_media';
      const LOCAL_MEDIA_UPLOAD_ENDPOINT = '/__local_media_upload';

      function resolveMediaPath(path, _mediaType) {
        const raw = String(path || '').trim();

        if (!raw) {
          return raw;
        }

        if (/^(https?:|data:|blob:)/i.test(raw)) {
          return raw;
        }

        if (raw.startsWith('~/') || raw.startsWith('/')) {
          return `${LOCAL_MEDIA_ENDPOINT}?path=${encodeURIComponent(raw)}`;
        }

        return raw;
      }

      function readBlobAsDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();

          reader.onerror = () => reject(new Error('Failed to read media blob'));
          reader.onload = () => resolve(String(reader.result || ''));
          reader.readAsDataURL(blob);
        });
      }

      async function persistMediaBlob(blob) {
        const fileName =
          blob && typeof blob.name === 'string' && blob.name.trim() ? blob.name.trim() : 'media';
        const mimeType = String((blob && blob.type) || '').trim();
        const query = new URLSearchParams({
          fileName,
          mimeType
        });
        const response = await fetch(`${LOCAL_MEDIA_UPLOAD_ENDPOINT}?${query.toString()}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/octet-stream'
          },
          body: blob
        });

        if (!response.ok) {
          let details = '';
          try {
            details = await response.text();
          } catch (_error) {
            details = '';
          }

          throw new Error(
            details
              ? `Upload failed (${response.status}): ${details}`
              : `Upload failed with status ${response.status}`
          );
        }

        const payload = await response.json();
        const path = String((payload && payload.path) || '').trim();

        if (!path) {
          throw new Error('Upload response does not contain media path');
        }

        return path;
      }

      const themeStorageKey = 'themeMode';
      const media = window.matchMedia('(prefers-color-scheme: dark)');
      const storedMode = localStorage.getItem(themeStorageKey);
      const themeMode =
        storedMode === 'light' || storedMode === 'dark' || storedMode === 'auto'
          ? storedMode
          : 'auto';
      const initialTheme = themeMode === 'dark' || (themeMode === 'auto' && media.matches) ? 'dark' : 'light';

      const editor = new Editor({
        el: document.querySelector('#editor'),
        previewStyle: 'vertical',
        height: '100%',
        initialEditType: 'wysiwyg',
        initialValue: fullFeatured2026Content,
        theme: initialTheme,
        hooks: {
          resolveMediaPath,
          addImageBlobHook: async (blob, callback) => {
            const fileName =
              blob && typeof blob.name === 'string' && blob.name.trim() ? blob.name.trim() : 'media';
            const isImage = String((blob && blob.type) || '')
              .toLowerCase()
              .startsWith('image/');

            if (isImage) {
              const dataUrl = await readBlobAsDataUrl(blob);

              callback(dataUrl, fileName);
              return;
            }

            try {
              const savedPath = await persistMediaBlob(blob);

              callback(savedPath, fileName);
            } catch (error) {
              const details =
                error && typeof error.message === 'string'
                  ? error.message
                  : 'Failed to persist media file';

              alert(details);
            }
          }
        },
        plugins: [
          [chart, chartOptions],
          [codeSyntaxHighlight, { highlighter: Prism }],
          colorSyntax,
          tableMergedCell,
          uml,
          sequence,
          flowchart,
          graphviz,
          abc,
          mermaid,
          katex,
          [exportPlugin, { toolbarGroupIndex: 99, toolbarItemIndex: 1 }]
        ]
      });

      const bodyEl = document.body;
      let currentMode = themeMode;
      const themeIcons = Editor.themeIcons;
      const getRootEl = () =>
        document.querySelector('.toastui-editor-defaultUI, .td-editor-defaultUI');
      const getThemeIcon = (mode) => {
        const iconFactory = themeIcons && themeIcons[mode];

        if (typeof iconFactory === 'function') {
          return iconFactory();
        }

        const fallback = document.createElement('span');
        fallback.textContent = String(mode || 'T').slice(0, 1).toUpperCase();
        fallback.style.fontSize = '12px';
        fallback.style.lineHeight = '1';

        return fallback;
      };

      const themeSplit = document.createElement('div');
      const themeMainButton = document.createElement('button');
      const themeCaretButton = document.createElement('button');
      const themeIconWrap = document.createElement('span');

      themeSplit.className = 'export-split';
      themeSplit.setAttribute('role', 'group');

      themeMainButton.type = 'button';
      themeMainButton.className = 'toastui-editor-toolbar-icons export-split-main';
      themeMainButton.setAttribute('aria-label', 'Theme');

      themeIconWrap.className = 'export-split-icon theme-split-icon';
      themeMainButton.appendChild(themeIconWrap);

      themeCaretButton.type = 'button';
      themeCaretButton.className = 'toastui-editor-toolbar-icons export-split-caret';
      themeCaretButton.setAttribute('aria-label', 'Theme options');
      themeCaretButton.setAttribute('aria-haspopup', 'menu');
      themeCaretButton.textContent = '▾';

      themeSplit.appendChild(themeMainButton);
      themeSplit.appendChild(themeCaretButton);

      const menuStateKey = '__toastuiToolbarMenuState';
      const menuState = window[menuStateKey] || { openId: null };

      if (!window[menuStateKey]) {
        window[menuStateKey] = menuState;
      }

      if (!menuState.listenerAttached) {
        document.addEventListener('mousedown', (event) => {
          const target = event.target;

          if (
            target.closest('.toastui-editor-popup, .td-editor-popup') ||
            target.closest(
              '.toastui-editor-toolbar-item-wrapper, .td-editor-toolbar-item-wrapper'
            )
          ) {
            return;
          }

          menuState.openId = null;
        });
        menuState.listenerAttached = true;
      }

      const applyTheme = (mode, shouldPersist = true) => {
        const useDark = mode === 'dark' || (mode === 'auto' && media.matches);
        const rootEl = getRootEl();

        if (rootEl) {
          rootEl.classList.toggle('toastui-editor-dark', useDark);
          rootEl.classList.toggle('td-editor-dark', useDark);
        }

        if (typeof editor.setTheme === 'function') {
          editor.setTheme(useDark ? 'dark' : 'light');
        }

        bodyEl.classList.toggle('dark', useDark);
        themeIconWrap.textContent = '';
        themeIconWrap.appendChild(getThemeIcon(mode));
        currentMode = mode;

        if (shouldPersist) {
          localStorage.setItem(themeStorageKey, mode);
        }
      };

      const closeThemePopup = () => {
        editor.eventEmitter.emit('closePopup');
        menuState.openId = null;
      };

      const createThemeMenuItem = (label, mode) => {
        const item = document.createElement('li');
        const icon = document.createElement('span');
        const text = document.createElement('span');

        item.className = 'menu-item';
        item.setAttribute('role', 'menuitem');
        item.tabIndex = 0;
        icon.className = 'export-menu-icon theme-menu-icon';
        icon.appendChild(getThemeIcon(mode));
        text.textContent = label;
        item.appendChild(icon);
        item.appendChild(text);

        const handleSelect = () => {
          applyTheme(mode);
          closeThemePopup();
        };

        item.addEventListener('click', (event) => {
          event.preventDefault();
          handleSelect();
        });
        item.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            handleSelect();
          } else if (event.key === 'Escape') {
            event.preventDefault();
            closeThemePopup();
          }
        });

        return item;
      };

      const themeMenu = document.createElement('ul');

      themeIconWrap.appendChild(getThemeIcon(currentMode));

      themeMenu.className = 'menu-group';
      themeMenu.setAttribute('role', 'menu');
      themeMenu.appendChild(createThemeMenuItem('Auto', 'auto'));
      themeMenu.appendChild(createThemeMenuItem('Light', 'light'));
      themeMenu.appendChild(createThemeMenuItem('Dark', 'dark'));

      editor.insertToolbarItem(
        { groupIndex: 98, itemIndex: 0 },
        {
          el: themeSplit,
          name: 'themeToggle',
          tooltip: 'Theme',
          popup: {
            body: themeMenu,
            className: 'toastui-editor-popup-add-heading export-split-menu'
          }
        }
      );

      const openThemeMenu = () => {
        const wrapper = themeSplit.closest(
          '.toastui-editor-toolbar-item-wrapper, .td-editor-toolbar-item-wrapper'
        );

        if (wrapper) {
          wrapper.dispatchEvent(new MouseEvent('click', { bubbles: true }));
        }
      };

      const toggleThemeMenu = () => {
        if (menuState.openId === 'theme') {
          closeThemePopup();
          return;
        }

        closeThemePopup();
        menuState.openId = 'theme';
        openThemeMenu();
      };

      const bindToggle = (button) => {
        button.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          toggleThemeMenu();
        });
        button.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            event.stopPropagation();
            toggleThemeMenu();
          } else if (event.key === 'Escape') {
            event.preventDefault();
            closeThemePopup();
          }
        });
      };

      bindToggle(themeMainButton);
      bindToggle(themeCaretButton);


      const handleMediaChange = () => {
        if (currentMode === 'auto') {
          applyTheme('auto', false);
        }
      };

      if (media.addEventListener) {
        media.addEventListener('change', handleMediaChange);
      } else {
        media.addListener(handleMediaChange);
      }

      applyTheme(currentMode, false);

      const toolbarEl = document.querySelector(
        '.toastui-editor-defaultUI-toolbar, .td-editor-defaultUI-toolbar'
      );
      const exportButton = toolbarEl && toolbarEl.querySelector('.export-split');

      if (exportButton) {
        const exportGroup = exportButton.closest(
          '.toastui-editor-toolbar-group, .td-editor-toolbar-group'
        );

        if (exportGroup) {
          exportGroup.classList.add('export-toolbar-group');
        }
      }
      } catch (error) {
        const details =
          error && error.stack ? error.stack : String(error);
        window.__ex20ShowError('[bootstrap]\\n' + details);
        throw error;
      }
    </script>
  </body>
</html>
